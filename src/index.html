<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">

  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    style-src 'self' 'unsafe-inline' https:;
    script-src 'self' 'unsafe-inline' 'unsafe-eval';
    img-src 'self' https: data:;
    font-src 'self' https://fonts.cdnfonts.com https://fonts.gstatic.com;
    object-src 'none';
  ">

  <title>BiblioteCardo</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="angulibrary-logo.svg">
  <link href="https://fonts.cdnfonts.com/css/object-sans" rel="stylesheet">

  <script>
  (function () {
    try {
      const saved = localStorage.getItem('theme');
      const theme = saved ? saved : 'dark-mode';

      document.documentElement.classList.add(theme);
      document.body.classList.add(theme);
    } catch (e) {
      document.documentElement.classList.add('dark-mode');
      document.body.classList.add('dark-mode');
    }
  })();
</script>

</head>

<body>
  <app-root></app-root>
</body>

</html>
