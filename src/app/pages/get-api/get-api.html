<div class="container mt-4">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Finder</h2>

    <div class="d-flex align-items-center gap-2">

      <!-- contador de favoritos -->
      <span class="badge bg-warning text-dark">
        ⭐ {{ favorites.length }}
      </span>

      <!-- toggle tema -->
      <button class="btn btn-sm btn-outline-warning" (click)="toggleTheme()">
        🌙 / ☀️
      </button>

    </div>
  </div>

  <!-- BUSCA -->
  <form (submit)="getBooks(); $event.preventDefault()">
    <div class="input-group mb-3 shadow-sm">
      <input type="text" class="form-control" placeholder="Digite o nome do livro" [(ngModel)]="query" name="query" />
      <button class="btn btn-warning btn-sm">
        Buscar
      </button>
    </div>
  </form>

  <!-- FILTROS -->
  <div class="row mb-3 g-2">

    <div class="col-md-4">
      <label class="form-label small text-muted">
        Filtrar por Autor
      </label>

      <input type="text" class="form-control form-control-sm" [(ngModel)]="filterAuthor" name="filterAuthor"
        (ngModelChange)="applyFilters()" />
    </div>

    <div class="col-md-3">
      <label class="form-label small text-muted">
        Ano
      </label>

      <input type="number" class="form-control form-control-sm" [(ngModel)]="filterYear" name="filterYear"
        (ngModelChange)="applyFilters()" />
    </div>

    <div class="col-md-5">
      <label class="form-label small text-muted">
        Gênero
      </label>

      <input type="text" class="form-control form-control-sm" [(ngModel)]="filterGenre" name="filterGenre"
        (ngModelChange)="applyFilters()" />
    </div>

    <div class="col-12">
      <button class="btn btn-sm btn-outline-warning" (click)="clearFilters()">
        Limpar filtros
      </button>
    </div>

  </div>

  <!-- TABELA -->
  <div *ngIf="books.length > 0" class="table-responsive shadow-sm rounded">

    <table class="table table-hover modern-table align-middle">

      <thead>
        <tr>
          <th>Capa</th>
          <th>Título</th>
          <th>Autor(es)</th>
          <th>Gêneros</th>
          <th>Data</th>
          <th>Ação</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let book of books">

          <td style="width:80px" class="text-center">
            <img *ngIf="book.thumbnail" [src]="book.thumbnail" class="img-thumbnail" style="max-height:80px" />
          </td>

          <td>{{ book.title }}</td>

          <td>{{ (book.authors || []).join(', ') }}</td>

          <td>{{ (book.genres || []).join(', ') }}</td>

          <td>{{ book.publishedDate }}</td>

          <!-- ⭐ AÇÕES -->
          <td>
            <div class="d-flex gap-2">

              <a *ngIf="book.infoLink" [href]="book.infoLink" target="_blank" class="btn btn-sm btn-warning">
                Visualizar
              </a>

              <button class="btn btn-sm" [ngClass]="isFavorite(book) ? 'btn-warning' : 'btn-outline-warning'"
                (click)="toggleFavorite(book)">
                {{ isFavorite(book) ? '★' : '☆' }}
              </button>
            </div>
          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- SEM RESULTADO -->
  <div *ngIf="books.length === 0" class="text-center text-muted mt-4">
    Nenhum livro encontrado 
  </div>

  <!-- PAGINAÇÃO -->
  <nav aria-label="Navegação de páginas" class="d-flex justify-content-center mt-4">
    <ul class="pagination pagination-circle">

      <li class="page-item">
        <a class="page-link" (click)="prevPage()" [class.disabled]="currentPage === 1">
          ‹
        </a>
      </li>

      <li class="page-item" *ngFor="let p of [].constructor(totalPages); index as i">
        <a class="page-link" [class.active]="currentPage === i + 1" (click)="currentPage = i + 1; applyFilters();">
          {{ i + 1 }}
        </a>
      </li>

      <li class="page-item">
        <a class="page-link" (click)="nextPage()" [class.disabled]="currentPage === totalPages">
          ›
        </a>
      </li>

    </ul>
  </nav>

</div>
